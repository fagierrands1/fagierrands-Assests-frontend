{% extends 'base.html' %}

{% block title %}Network Discovery - Asset Management System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
    <h1 class="h2">Network Discovery</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <div class="btn-group me-2">
            <button type="button" class="btn btn-sm btn-primary">
                <i class="fas fa-play me-1"></i>Start Discovery
            </button>
            <button type="button" class="btn btn-sm btn-outline-secondary">
                <i class="fas fa-cog me-1"></i>Settings
            </button>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Discovery Status</h5>
            </div>
            <div class="card-body">
                <div class="text-center py-5">
                    <i class="fas fa-search fa-4x text-muted mb-3"></i>
                    <h4>Network Discovery</h4>
                    <p class="text-muted">{{ message }}</p>
                    <button type="button" class="btn btn-primary">
                        <i class="fas fa-play me-1"></i>Start Network Scan
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-lg-4">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Discovery Settings</h5>
            </div>
            <div class="card-body">
                <form>
                    <div class="mb-3">
                        <label for="ip_range" class="form-label">IP Range</label>
                        <input type="text" class="form-control" id="ip_range" placeholder="192.168.1.0/24">
                    </div>
                    <div class="mb-3">
                        <label for="scan_type" class="form-label">Scan Type</label>
                        <select class="form-select" id="scan_type">
                            <option>Quick Scan</option>
                            <option>Full Scan</option>
                            <option>Custom</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="auto_import">
                            <label class="form-check-label" for="auto_import">
                                Auto-import discovered assets
                            </label>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
