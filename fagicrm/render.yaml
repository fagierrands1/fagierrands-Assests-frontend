services:
  - type: web
    name: fagicrm-frontend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn fagicrm.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: fagicrm-db
          property: connectionString
